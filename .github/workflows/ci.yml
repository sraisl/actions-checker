name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

  merge-gate:
    name: Merge Gate (main)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main'

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify formatting (gofmt)
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Verify go.mod/go.sum consistency
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test with race detector
        run: go test -race ./...

      - name: Check GitHub Actions versions
        run: |
          go build -o "$GITHUB_WORKSPACE/bin/action-version-check" ./cmd/action-version-check
          "$GITHUB_WORKSPACE/bin/action-version-check" "$GITHUB_WORKSPACE/.github/workflows"

  release-build:
    name: Release Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    concurrency:
      group: release-build-${{ github.ref }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Get git tag
        id: get_tag
        run: |
          echo "tag=$(git describe --tags --abbrev=0)" >> $GITHUB_OUTPUT

      - name: Cache release binaries
        uses: actions/cache@v4.2.0
        with:
          path: |
            dist
          key: release-${{ matrix.goos }}-${{ matrix.goarch }}-${{ steps.get_tag.outputs.tag }}
          restore-keys: |
            release-${{ matrix.goos }}-${{ matrix.goarch }}-

      - name: Build release binary
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then
            ext=".exe"
          fi

          if [ -f "dist/action-version-check-${GOOS}-${GOARCH}${ext}" ]; then
            echo "Skipping build, using cached artifact"
            exit 0
          fi

          mkdir -p dist

          out="action-version-check-${GOOS}-${GOARCH}${ext}"
          go build \
            -trimpath \
            -ldflags "-s -w" \
            -o "dist/${out}" \
            ./cmd/action-version-check

      - name: Upload build artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  release-publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release-build
    permissions:
      contents: write
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4.1.8
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2.2.1
        with:
          files: dist/*
          generate_release_notes: true
